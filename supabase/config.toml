# Tempo Supabase 项目配置
# 文档: https://supabase.com/docs/guides/local-development/cli/config

project_id = "tempo"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "tempo://login-callback"
additional_redirect_urls = ["tempo://login-callback"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.external.apple]
enabled = false

# ============ Edge Functions ============
[functions.parse-task]
verify_jwt = false

[functions.siyuan-pairing]
verify_jwt = false

[functions.voice-task]
verify_jwt = false
